name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cinav2/package-lock.json
      - working-directory: cinav2
        run: npm ci
      - working-directory: cinav2
        run: npm run check
      - working-directory: cinav2
        run: npm test
      - working-directory: cinav2
        run: npm run build
